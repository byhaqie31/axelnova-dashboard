services:
  axelnova-dashboard-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: axelnova-dashboard:dev
    container_name: axelnova-dashboard-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:3003:3000"
      - "127.0.0.1:24678:24678"   # Vite HMR websocket
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3000
      NUXT_TELEMETRY_DISABLED: "1"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "400"
    volumes:
      # Mount source for hot reload; keep node_modules / build cache inside the container
      - ./app:/app/app
      - ./public:/app/public
      - ./nuxt.config.ts:/app/nuxt.config.ts
      - ./app.config.ts:/app/app.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
      - node_modules:/app/node_modules
      - nuxt_cache:/app/.nuxt
      - nitro_cache:/app/.nitro

volumes:
  node_modules:
  nuxt_cache:
  nitro_cache:
