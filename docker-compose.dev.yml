services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    image: axelnova-backend:dev
    container_name: axelnova-backend-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:8003:8003"
    volumes:
      - ./backend:/app
    environment:
      # Override DB_HOST so Laravel resolves the shared MySQL via the docker network
      DB_HOST: mysql
    networks:
      - axelnova-shared

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    image: axelnova-frontend:dev
    container_name: axelnova-frontend-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:3003:3000"
      - "127.0.0.1:24678:24678"   # Vite HMR websocket
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3000
      NUXT_TELEMETRY_DISABLED: "1"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "400"
      # Browser hits the backend via the Mac host loopback (container hostnames don't resolve on the host).
      NUXT_PUBLIC_API_BASE: http://127.0.0.1:8003
      # Empty in local dev — the frontend skips the Turnstile widget when this is unset.
      # Backend mirrors this via TURNSTILE_SECRET being empty in backend/.env.
      # For prod: set both NUXT_PUBLIC_TURNSTILE_SITE_KEY (here) and TURNSTILE_SECRET (backend .env)
      # to real Cloudflare values. To use Cloudflare's official always-pass test key, use:
      # 1x00000000000000000000AA
      NUXT_PUBLIC_TURNSTILE_SITE_KEY: ""
    volumes:
      - ./frontend/app:/app/app
      - ./frontend/public:/app/public
      - ./frontend/nuxt.config.ts:/app/nuxt.config.ts
      - ./frontend/app.config.ts:/app/app.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/package.json:/app/package.json
      - ./frontend/package-lock.json:/app/package-lock.json
      - frontend_node_modules:/app/node_modules
      - frontend_nuxt_cache:/app/.nuxt
      - frontend_nitro_cache:/app/.nitro
    depends_on:
      - backend
    networks:
      - axelnova-shared

volumes:
  frontend_node_modules:
  frontend_nuxt_cache:
  frontend_nitro_cache:

networks:
  axelnova-shared:
    name: axelnova-shared
    external: true
