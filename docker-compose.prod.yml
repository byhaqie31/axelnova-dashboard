# Production stack for axelnova-dashboard monorepo.
#
# Prereqs on the VPS (one-time):
#   1. Shared infra running:           cd ~/infra && docker compose up -d
#   2. Storage host dir exists:        mkdir -p ~/data/axelnova-dashboard/storage
#   3. Env files filled in:            backend/.env.production, frontend/.env.production
#
# First deploy:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Subsequent deploys:
#   git pull
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml exec backend php artisan migrate --force
#
# Logs live at: ~/data/axelnova-dashboard/storage/logs/laravel.log

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: axelnova-backend:latest
    container_name: axelnova-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8003:8003"
    env_file:
      - ./backend/.env.production
    environment:
      DB_HOST: mysql
    volumes:
      - ~/data/axelnova-dashboard/storage:/app/storage
    networks:
      - axelnova-shared
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  queue:
    image: axelnova-backend:latest
    container_name: axelnova-queue
    restart: unless-stopped
    command:
      - php
      - artisan
      - queue:work
      - --tries=3
      - --sleep=3
      - --max-time=3600
      - --max-jobs=1000
    env_file:
      - ./backend/.env.production
    environment:
      DB_HOST: mysql
    volumes:
      - ~/data/axelnova-dashboard/storage:/app/storage
    depends_on:
      - backend
    networks:
      - axelnova-shared
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: axelnova-frontend:latest
    container_name: axelnova-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3003:3000"
    env_file:
      - ./frontend/.env.production
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      NUXT_TELEMETRY_DISABLED: "1"
    networks:
      - axelnova-shared
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  axelnova-shared:
    name: axelnova-shared
    external: true
