<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Axel Nova — Mission Control</title>
  <link rel="icon" type="image/svg+xml" href="axelnovaicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #020408;
      --surface:   #080f18;
      --border:    rgba(0, 200, 255, 0.12);
      --accent:    #00c8ff;
      --accent2:   #ff4d6d;
      --accent3:   #39ff7a;
      --text:      #d0e8f5;
      --muted:     rgba(176, 220, 240, 0.4);
      --glow:      0 0 24px rgba(0,200,255,0.25);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    /* STARFIELD */
    #starfield {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
    }

    /* SCANLINE */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 1;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent, transparent 2px,
        rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px
      );
    }

    /* NOISE */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 2;
      pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 1.2rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(to bottom, rgba(2,4,8,0.95), transparent);
      backdrop-filter: blur(8px);
    }

    .nav-logo {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: 1.25rem;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-shadow: var(--glow);
      text-decoration: none;
    }
    .nav-logo span { color: var(--accent2); }

    .nav-credit {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      text-decoration: none;
      opacity: 0;
      animation: fadeUp 0.8s 0.65s forwards;
    }
    .nav-credit:hover { color: var(--accent); }

    .nav-status {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--accent3);
      letter-spacing: 0.1em;
      display: flex; align-items: center; gap: 0.5rem;
    }

    .pulse-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent3);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(57,255,122,0.5); }
      50%       { opacity: 0.5; box-shadow: 0 0 0 6px rgba(57,255,122,0); }
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      text-align: center;
      padding: 8rem 2rem 4rem;
      position: relative; z-index: 10;
    }

    .hero-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.35em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.8s 0.3s forwards;
    }

    .hero-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(2.8rem, 8vw, 7rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.02em;
      margin-bottom: 0.3rem;
      opacity: 0;
      animation: fadeUp 0.8s 0.5s forwards;
    }

    .hero-title .line1 { display: block; color: #fff; }
    .hero-title .line2 {
      display: block;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-family: 'DM Mono', monospace;
      font-size: 0.88rem;
      color: var(--muted);
      margin-top: 1.8rem;
      max-width: 520px;
      line-height: 1.8;
      letter-spacing: 0.05em;
      opacity: 0;
      animation: fadeUp 0.8s 0.7s forwards;
    }

    .hero-divider {
      width: 60px; height: 1px;
      background: linear-gradient(to right, var(--accent), transparent);
      margin: 2rem auto;
      opacity: 0;
      animation: fadeUp 0.8s 0.9s forwards;
    }

    .terminal {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--accent3);
      letter-spacing: 0.08em;
      margin-top: 0.5rem;
      opacity: 0;
      animation: fadeUp 0.8s 1.1s forwards;
    }

    .cursor {
      display: inline-block;
      width: 8px; height: 14px;
      background: var(--accent3);
      vertical-align: middle;
      animation: blink 1s step-start infinite;
      margin-left: 2px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* LAUNCH BUTTON */
    .launch-wrap {
      margin-top: 2.5rem;
      display: flex; flex-direction: column; align-items: center; gap: 1rem;
      opacity: 0;
      animation: fadeUp 0.8s 1.4s forwards;
    }

    .launch-btn {
      position: relative;
      font-family: 'Orbitron', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      color: var(--bg);
      background: var(--accent);
      border: none;
      padding: 1rem 3rem;
      border-radius: 2px;
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: 0 0 30px rgba(0,200,255,0.3), 0 0 60px rgba(0,200,255,0.1);
      transition: box-shadow 0.3s, transform 0.2s;
      overflow: hidden;
    }

    .launch-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }

    .launch-btn:hover::before { transform: translateX(100%); }

    .launch-btn:hover {
      box-shadow: 0 0 50px rgba(0,200,255,0.5), 0 0 100px rgba(0,200,255,0.2);
      transform: translateY(-2px);
    }

    .launch-btn:active { transform: translateY(0); }

    .launch-hint {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    /* HEX BG */
    .hex-bg {
      position: absolute;
      right: -10%; top: 50%;
      transform: translateY(-50%);
      width: 500px; height: 500px;
      opacity: 0.04;
      pointer-events: none;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* LAUNCH OVERLAY */
    #launch-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 999;
      pointer-events: none;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 5vh;
    }
    #launch-overlay.active { display: flex; }

    /* dim hero behind */
    #hero-dim {
      position: fixed; inset: 0; z-index: 998;
      background: rgba(2,4,8,0);
      pointer-events: none;
      transition: background 0.4s;
    }
    #hero-dim.dark { background: rgba(2,4,8,0.7); }

    /* rocket scene wrapper */
    #rocket-scene {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      /* start at bottom-center, will animate upward */
      transform: translateY(0);
    }

    #rocket-scene.rumble {
      animation: rumble 0.4s ease-in-out;
    }

    @keyframes rumble {
      0%,100% { transform: translateX(0); }
      20%  { transform: translateX(-4px) rotate(-1deg); }
      40%  { transform: translateX(4px) rotate(1deg); }
      60%  { transform: translateX(-3px) rotate(-0.5deg); }
      80%  { transform: translateX(3px) rotate(0.5deg); }
    }

    #rocket-scene.liftoff {
      animation: liftoff 1.1s cubic-bezier(0.2, 0, 0.1, 1) forwards;
    }

    @keyframes liftoff {
      0%   { transform: translateY(0) scale(1); opacity: 1; }
      10%  { transform: translateY(10px) scale(1.03); }
      20%  { transform: translateY(-30px) scale(1); }
      60%  { transform: translateY(-60vh) scale(0.75); opacity: 1; }
      100% { transform: translateY(-130vh) scale(0.3); opacity: 0; }
    }

    /* SVG rocket */
    #rocket-svg {
      width: 160px;
      height: auto;
      filter: drop-shadow(0 0 30px rgba(0,200,255,0.6)) drop-shadow(0 0 60px rgba(0,200,255,0.3));
      position: relative;
      z-index: 2;
    }

    /* flame */
    #flame-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: -8px;
      position: relative;
      z-index: 1;
      opacity: 0;
    }
    #flame-wrap.ignite { animation: flameIn 0.3s 0.1s forwards; }
    #flame-wrap.burning { opacity: 1; }

    @keyframes flameIn {
      from { opacity: 0; transform: scaleY(0.2); }
      to   { opacity: 1; transform: scaleY(1); }
    }

    .flame-core {
      width: 28px; height: 90px;
      background: linear-gradient(to bottom, #fff 0%, #00c8ff 20%, #ff9f43 60%, #ff4d6d 85%, transparent 100%);
      border-radius: 0 0 50% 50%;
      filter: blur(3px);
      animation: flicker 0.08s infinite alternate;
    }
    .flame-mid {
      position: absolute;
      top: 0;
      width: 50px; height: 120px;
      background: linear-gradient(to bottom, rgba(0,200,255,0.4) 0%, rgba(255,100,50,0.3) 50%, transparent 100%);
      border-radius: 0 0 50% 50%;
      filter: blur(8px);
      animation: flicker 0.12s infinite alternate-reverse;
    }
    .flame-outer {
      position: absolute;
      top: 0;
      width: 80px; height: 160px;
      background: linear-gradient(to bottom, rgba(0,200,255,0.15) 0%, rgba(255,80,0,0.1) 50%, transparent 100%);
      border-radius: 0 0 50% 50%;
      filter: blur(16px);
      animation: flicker 0.15s infinite alternate;
    }

    @keyframes flicker {
      from { transform: scaleX(1) scaleY(1); }
      to   { transform: scaleX(1.08) scaleY(1.04); }
    }

    /* smoke pads */
    .smoke {
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px; height: 40px;
      background: radial-gradient(ellipse, rgba(150,200,220,0.25) 0%, transparent 70%);
      filter: blur(10px);
      opacity: 0;
      border-radius: 50%;
    }
    #flame-wrap.burning .smoke {
      animation: smokeSpread 1.2s ease-out forwards;
    }

    @keyframes smokeSpread {
      0%   { opacity: 0; transform: translateX(-50%) scale(0.5); }
      30%  { opacity: 1; }
      100% { opacity: 0; transform: translateX(-50%) scale(2.5) translateY(20px); }
    }

    /* screen flash */
    #flash {
      position: fixed; inset: 0; z-index: 1000;
      background: #fff;
      opacity: 0;
      pointer-events: none;
    }
    #flash.go { animation: bigFlash 0.5s forwards; }

    @keyframes bigFlash {
      0%   { opacity: 0; }
      15%  { opacity: 0.4; }
      100% { opacity: 0; }
    }

    /* ground glow on launch */
    #ground-glow {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 400px; height: 200px;
      background: radial-gradient(ellipse, rgba(0,200,255,0.3) 0%, transparent 70%);
      filter: blur(20px);
      opacity: 0;
      z-index: 997;
      pointer-events: none;
    }
    #ground-glow.active {
      animation: glowPulse 1.4s ease-out forwards;
    }

    @keyframes glowPulse {
      0%   { opacity: 0; }
      20%  { opacity: 1; }
      100% { opacity: 0; transform: translateX(-50%) scaleX(2); }
    }

    @media (max-width: 640px) {
      nav { flex-direction: column; align-items: center; gap: 0.4rem; }
      .nav-logo { display: none; }
      .nav-status { order: 1; }
    }
  </style>
</head>
<body>

<canvas id="starfield"></canvas>
<div id="flash"></div>
<div id="hero-dim"></div>
<div id="ground-glow"></div>

<div id="launch-overlay">
  <div id="rocket-scene">
    <!-- flame below rocket -->
    <div id="flame-wrap">
      <div class="smoke"></div>
      <div class="flame-outer"></div>
      <div class="flame-mid"></div>
      <div class="flame-core"></div>
    </div>

    <!-- SVG rocket (pointing up) -->
    <svg id="rocket-svg" viewBox="0 0 100 200" fill="none" xmlns="http://www.w3.org/2000/svg" style="order:-1">
      <!-- body -->
      <path d="M50 5 C30 5 18 40 18 80 L18 145 L82 145 L82 80 C82 40 70 5 50 5Z" fill="#0a1a2e" stroke="rgba(0,200,255,0.6)" stroke-width="1.5"/>
      <!-- nose cone -->
      <path d="M50 5 C38 5 28 22 24 42 L76 42 C72 22 62 5 50 5Z" fill="#00c8ff" opacity="0.9"/>
      <!-- window -->
      <circle cx="50" cy="80" r="14" fill="none" stroke="rgba(0,200,255,0.8)" stroke-width="2"/>
      <circle cx="50" cy="80" r="10" fill="rgba(0,200,255,0.12)"/>
      <circle cx="50" cy="80" r="5" fill="rgba(0,200,255,0.4)"/>
      <!-- left fin -->
      <path d="M18 110 L2 148 L18 140Z" fill="#00c8ff" opacity="0.7"/>
      <!-- right fin -->
      <path d="M82 110 L98 148 L82 140Z" fill="#00c8ff" opacity="0.7"/>
      <!-- nozzle -->
      <rect x="38" y="143" width="24" height="14" rx="3" fill="#0a1a2e" stroke="rgba(0,200,255,0.5)" stroke-width="1"/>
      <!-- body stripe -->
      <rect x="18" y="95" width="64" height="2" fill="rgba(0,200,255,0.2)" rx="1"/>
      <rect x="18" y="105" width="64" height="1" fill="rgba(0,200,255,0.12)" rx="1"/>
      <!-- glow line on nose -->
      <path d="M36 30 Q50 10 64 30" stroke="rgba(255,255,255,0.3)" stroke-width="1" fill="none"/>
    </svg>
  </div>
</div>

<!-- NAV -->
<nav>
  <a href="/" class="nav-logo">AXEL<span>NOVA</span></a>
  <div class="nav-status">
    <div class="pulse-dot"></div>
    ALL SYSTEMS OPERATIONAL
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <svg class="hex-bg" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="hex" width="56" height="97" patternUnits="userSpaceOnUse">
        <polygon points="28,1 55,14.5 55,41.5 28,55 1,41.5 1,14.5" fill="none" stroke="cyan" stroke-width="0.5"/>
        <polygon points="28,48 55,61.5 55,88.5 28,102 1,88.5 1,61.5" fill="none" stroke="cyan" stroke-width="0.5"/>
      </pattern>
    </defs>
    <rect width="500" height="500" fill="url(#hex)"/>
  </svg>

  <p class="hero-eyebrow">// MISSION CONTROL — AXELNOVA.TECH</p>
  <h1 class="hero-title">
    <span class="line1">AXEL</span>
    <span class="line2">NOVA</span>
  </h1>
  <a href="https://portfoliobaihaqie.axelnova.tech/" class="nav-credit" target="_blank" rel="noopener">by&nbsp;Baihaqie&nbsp;Yusri</a>
  <div class="hero-divider"></div>
  <p class="hero-sub">Full-Stack Engineer & Systems Architect.<br>Building high-performance applications at scale.</p>
  <p class="terminal">&gt; Navigating to project hub...<span class="cursor"></span></p>

  <div class="launch-wrap">
    <button class="launch-btn" id="launchBtn">INITIATE LAUNCH</button>
    <span class="launch-hint">// access project registry</span>
  </div>
</section>

<script>
  /* STARFIELD */
  const canvas = document.getElementById('starfield');
  const ctx    = canvas.getContext('2d');
  let stars    = [];

  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

  function initStars() {
    stars = Array.from({ length: 180 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.2 + 0.2,
      a: Math.random(),
      s: Math.random() * 0.003 + 0.001,
    }));
  }

  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const s of stars) {
      s.a += s.s;
      if (s.a > 1) { s.a = 0; s.x = Math.random() * canvas.width; s.y = Math.random() * canvas.height; }
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,230,255,${s.a * 0.8})`;
      ctx.fill();
    }
    requestAnimationFrame(drawStars);
  }

  resize(); initStars(); drawStars();
  window.addEventListener('resize', () => { resize(); initStars(); });

  /* LAUNCH */
  document.getElementById('launchBtn').addEventListener('click', function () {
    if (this.disabled) return;
    this.disabled = true;
    this.textContent = 'T-MINUS...';

    const overlay   = document.getElementById('launch-overlay');
    const scene     = document.getElementById('rocket-scene');
    const flameWrap = document.getElementById('flame-wrap');
    const dim       = document.getElementById('hero-dim');
    const flash     = document.getElementById('flash');
    const glow      = document.getElementById('ground-glow');

    // dim hero
    dim.classList.add('dark');

    // show rocket
    overlay.classList.add('active');

    // ignite flame after brief pause
    setTimeout(() => {
      flameWrap.classList.add('ignite');
      glow.classList.add('active');
    }, 200);

    // rumble
    setTimeout(() => {
      flameWrap.classList.add('burning');
      scene.classList.add('rumble');
      document.getElementById('launchBtn').textContent = 'IGNITION!';
    }, 400);

    // liftoff
    setTimeout(() => {
      scene.classList.remove('rumble');
      scene.classList.add('liftoff');
      flash.classList.add('go');
    }, 900);

    // navigate
    setTimeout(() => {
      window.location.href = 'projects.html';
    }, 1800);
  });
</script>

</body>
</html>
