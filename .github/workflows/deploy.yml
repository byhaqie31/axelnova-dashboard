name: Deploy to production

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Prevent two deploys racing each other; second push waits for first to finish.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          # 3-min timeout for the SSH connection itself; build inside takes longer
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd ~/axelnova-dashboard

            echo "=== fetch latest main ==="
            git fetch origin main
            git reset --hard origin/main
            git log --oneline -1

            echo ""
            echo "=== rebuild + start (incremental, layer-cached) ==="
            docker compose -f docker-compose.prod.yml up -d --build

            echo ""
            echo "=== wait for entrypoint config:cache ==="
            sleep 12

            echo ""
            echo "=== migrations (idempotent) ==="
            docker compose -f docker-compose.prod.yml exec -T backend php artisan migrate --force

            echo ""
            echo "=== restart queue worker (picks up new job code) ==="
            docker compose -f docker-compose.prod.yml exec -T backend php artisan queue:restart

            echo ""
            echo "=== container status ==="
            docker compose -f docker-compose.prod.yml ps

            echo ""
            echo "=== /up health check ==="
            curl -fsS http://127.0.0.1:8003/up && echo

            echo ""
            echo "=== prune dangling images ==="
            docker image prune -f
