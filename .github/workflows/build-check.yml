name: Build check

# Runs on every PR targeting main. Builds both Docker images to catch
# Dockerfile / source / dependency breakage BEFORE merge auto-deploys to prod.
# Does not push images, does not deploy.

on:
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed to the same PR
concurrency:
  group: build-check-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Build backend image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          load: true
          tags: axelnova-backend:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          load: true
          tags: axelnova-frontend:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
