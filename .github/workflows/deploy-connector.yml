name: Deploy MCP connector (Cloudflare Worker)

# Ships the connector/ MCP Worker to Cloudflare on merge to main. Path-filtered so
# it ONLY runs when the Worker actually changes — the VPS app deploy
# (deploy-ghcr.yml) is a separate pipeline and is untouched by this.
#
# This job ships CODE ONLY. The Worker's runtime secrets (CONNECTOR_TOKEN, API_BASE,
# ACCESS_USERNAME, ACCESS_PASSWORD) already live on Cloudflare and persist across
# deploys — see docs/global/MCP-CONNECTOR.md.
#
# Prerequisite: repo secret CLOUDFLARE_API_TOKEN (Cloudflare dashboard → My Profile
# → API Tokens → "Edit Cloudflare Workers" template).

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'connector/**'

# The Worker is a distinct deploy target from the VPS, so it gets its own group
# (never contends with deploy-prod); two connector deploys still can't race.
concurrency:
  group: deploy-connector
  cancel-in-progress: false

jobs:
  deploy:
    name: wrangler deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: connector/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: connector

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: connector
