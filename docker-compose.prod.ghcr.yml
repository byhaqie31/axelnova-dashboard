# Production stack for axelnova-dashboard monorepo — GHCR (image-pull) variant.
#
# Identical to docker-compose.prod.yml EXCEPT images are pulled from GHCR
# instead of built on the VPS. Used by .github/workflows/deploy-ghcr.yml.
#
# Prereqs on the VPS (one-time):
#   1. Shared infra running:           cd ~/infra && docker compose up -d
#   2. Storage host dir exists:        mkdir -p ~/data/axelnova-dashboard/storage
#   3. Env files filled in:            backend/.env.production, frontend/.env.production
#   4. Logged in to GHCR:              docker login ghcr.io -u byhaqie31
#
# Deploy (done by CI):
#   docker compose -f docker-compose.prod.ghcr.yml pull
#   docker compose -f docker-compose.prod.ghcr.yml up -d --no-deps backend frontend queue
#   docker compose -f docker-compose.prod.ghcr.yml exec backend php artisan migrate --force
#
# Logs live at: ~/data/axelnova-dashboard/storage/logs/laravel.log

services:
  backend:
    image: ghcr.io/byhaqie31/axelnova-dashboard-backend:latest
    container_name: axelnova-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8003:8003"
    env_file:
      - ./backend/.env.production
    environment:
      DB_HOST: mysql
    volumes:
      - ~/data/axelnova-dashboard/storage:/app/storage
    networks:
      - axelnova-shared
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  queue:
    image: ghcr.io/byhaqie31/axelnova-dashboard-backend:latest
    container_name: axelnova-queue
    restart: unless-stopped
    command:
      - php
      - artisan
      - queue:work
      - --tries=3
      - --sleep=3
      - --max-time=3600
      - --max-jobs=1000
    # Disable inherited HEALTHCHECK from the backend image — queue worker
    # has no HTTP server, so probing :8003/up always fails. Cosmetic-only.
    healthcheck:
      disable: true
    env_file:
      - ./backend/.env.production
    environment:
      DB_HOST: mysql
    volumes:
      - ~/data/axelnova-dashboard/storage:/app/storage
    depends_on:
      - backend
    networks:
      - axelnova-shared
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ghcr.io/byhaqie31/axelnova-dashboard-frontend:latest
    container_name: axelnova-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3003:3000"
    env_file:
      - ./frontend/.env.production
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      NUXT_TELEMETRY_DISABLED: "1"
    networks:
      - axelnova-shared
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  axelnova-shared:
    name: axelnova-shared
    external: true
