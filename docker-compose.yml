services:
  axelnova-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: axelnova-dashboard:latest
    container_name: axelnova-dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:3003:3000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      NUXT_TELEMETRY_DISABLED: "1"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
